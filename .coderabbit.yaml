# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
#
# CodeRabbit configuration — Pro/OSS, primary bot reviewer.
# Auto-review enabled: CodeRabbit reviews every PR automatically.
# Manual @coderabbitai review is used for re-review only.
# See .cursor/knowledge/review--bot-lifecycle.md for lifecycle details.

language: "en-US"
early_access: false

reviews:
  profile: "assertive"
  request_changes_workflow: false
  high_level_summary: true
  high_level_summary_in_walkthrough: true
  poem: false
  fortune: false
  review_status: false
  commit_status: false
  review_details: true
  collapse_walkthrough: true
  changed_files_summary: false
  sequence_diagrams: false
  estimated_effort_to_review_docs: false
  prompt_for_ai_agents: false
  related_issues: false
  related_prs: false
  suggested_labels: false
  auto_apply_labels: false
  suggested_reviewers: false
  auto_assign_reviewers: false
  auto_review:
    enabled: true
    drafts: false
    ignore_title_keywords:
      - "WIP"
      - "DO NOT MERGE"
  finishing_touches:
    docstrings:
      enabled: false
    unit_tests:
      enabled: false
  path_instructions:
    - path: "R/**"
      instructions: |
        R package using S7 class system (ADR-0001). Key review points beyond
        AGENTS.md: every S7 property needs an explicit type (no class_any),
        cross-file class references require @include roxygen directive,
        NULL assignment to list elements silently removes the field.
    - path: "tests/**"
      instructions: |
        Boundary values (0, min, max, +/-1, empty, NULL) must be covered.
        Exception tests must validate both error class and message pattern.
        New function parameters need wiring tests and effect tests.
    - path: "docs/schemas/**"
      instructions: |
        YAML schemas must stay consistent with S7 classes in R/.
        Validate that property names, types, and constraints match.
  tools:
    shellcheck:
      enabled: true
    yamllint:
      enabled: true
    markdownlint:
      enabled: true
    github-checks:
      enabled: true

chat:
  auto_reply: true

knowledge_base:
  code_guidelines:
    enabled: true
