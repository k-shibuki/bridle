repos:
  - repo: https://github.com/lorenzwalthert/precommit
    rev: v0.4.3
    hooks:
      - id: style-files
        args: [--style_pkg=styler, --style_fun=tidyverse_style]
      - id: roxygenize
      - id: use-tidy-description
      - id: spell-check
        exclude: >
          (?x)^(
          .*\.[rR]|
          .*\.feather|
          .*\.jpeg|
          .*\.pdf|
          .*\.png|
          .*\.py|
          .*\.RData|
          .*\.rds|
          .*\.Rds|
          .*\.Rproj\.user|
          .*\.sh|
          (.*/|)\.gitignore|
          (.*/|)\.pre-commit-.*|
          (.*/|)\.Rbuildignore|
          (.*/|)\.Renviron|
          (.*/|)\.Rprofile|
          (.*/|)NAMESPACE|
          (.*/|)renv\.lock|
          (.*/|)renv/.*
          )$
      - id: lintr
      - id: readme-rmd-rendered
      - id: parsable-R
      - id: no-browser-statement
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: end-of-file-fixer
        exclude: '\.Rd'
      - id: trailing-whitespace
        exclude: '\.Rd'
  - repo: local
    hooks:
      - id: schema-validate
        name: Validate YAML schemas
        entry: make schema-validate
        language: system
        files: 'docs/schemas/.*\.yaml$'
        pass_filenames: false
      - id: check-commit-msg
        name: Validate commit message format
        entry: bash tools/check-commit-msg.sh
        language: system
        stages: [commit-msg]
        always_run: true
      - id: check-nolint-format
        name: Validate nolint annotations (HS-NOLINT)
        entry: bash tools/check-nolint.sh
        language: system
        types: [r]
      - id: local-verification
        name: Local verification gate (HS-LOCAL-VERIFY)
        entry: bash tools/pre-push.sh
        language: system
        stages: [pre-push]
        always_run: true
        pass_filenames: false
