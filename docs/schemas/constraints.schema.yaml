# Constraints Schema
#
# constraints/technical.yaml holds inter-parameter technical constraints.
# Most are auto-generated by scan_package(); the source field tracks
# where each constraint was extracted from.
#
# Distinction from knowledge:
# - constraints define what "can/cannot" be done (technical facts)
# - knowledge provides material for "how to choose" (methodological knowledge)
#
# The runtime uses constraints to block invalid combinations and
# knowledge to let the LLM generate context-dependent recommendations.
#
# Related ADR: ADR-0004 (Scanner Three-Layer Analysis)

# --- Schema Definition ---

schema:
  version: "1.0"

  # Target package name
  package:
    type: string
    required: true

  # Target function name
  function:
    type: string
    required: true

  # Array of constraints
  constraints:
    type: list
    required: true
    items:

      # Unique constraint identifier
      id:
        type: string
        required: true
        description: "Unique identifier within the plugin (e.g., peto_requires_or)"

      # Extraction source
      source:
        type: string
        required: true
        enum:
          - formals_default   # extracted from formals() default expressions
          - rd_description    # extracted from Rd documentation
          - source_code       # extracted from stop()/warning() in source code
          - expert            # manually added by domain expert
        description: >
          Where this constraint was extracted from. Distinguishes
          auto-generated constraints from expert-added ones.

      # Constraint type
      type:
        type: string
        required: true
        enum:
          - forces          # one parameter value forces another parameter's value
          - requires        # one parameter value requires another parameter's value
          - valid_values    # list of valid values for a parameter
          - incompatible    # mutually exclusive parameter value combinations
          - conditional     # parameter is only effective under certain conditions

      # Target parameter (used by valid_values, conditional)
      param:
        type: string
        required: false
        description: "Parameter name this constraint applies to"

      # Trigger condition (used by forces, requires, incompatible, conditional)
      condition:
        type: string
        required: false
        description: >
          R expression for when this constraint fires.
          Example: "method == 'Peto'"

      # Forced parameter values (used by forces)
      forces:
        type: map[string, string]
        required: false
        description: >
          Parameter values forced when condition is true.
          Example: {sm: "OR"}

      # Required parameter values (used by requires)
      requires:
        type: map[string, string | list[string]]
        required: false
        description: >
          Parameter values required when condition is true.
          Example: {sm: "OR"} or {sm: ["OR", "DOR"]}

      # Valid value list (used by valid_values)
      values:
        type: list[string]
        required: false
        description: "List of valid values for the parameter"

      # Incompatible value combinations (used by incompatible)
      incompatible:
        type: map[string, string]
        required: false
        description: >
          Value combinations that cannot coexist.
          Example: {method: "Peto", sm: "RR"}

      # Conditional enablement (used by conditional)
      enabled_when:
        type: string
        required: false
        description: >
          Condition under which this parameter becomes effective.
          Example: "method == 'GLMM'" means model.glmm is only relevant for GLMM

      # Human-readable message (optional)
      message:
        type: string
        required: false
        description: >
          Message displayed to the user on constraint violation.
          For source: expert, include methodological rationale.

# --- Example: meta::metabin ---

example:
  package: meta
  function: metabin

  constraints:
    # --- auto-extracted from formals defaults ---

    - id: peto_forces_or
      source: formals_default
      type: forces
      condition: "method == 'Peto'"
      forces: {sm: "OR"}
      message: "Peto method is only available for odds ratio"

    - id: glmm_forces_or
      source: formals_default
      type: forces
      condition: "method == 'GLMM'"
      forces: {sm: "OR"}
      message: "GLMM is only available for odds ratio"

    - id: lrp_forces_or
      source: formals_default
      type: forces
      condition: "method == 'LRP'"
      forces: {sm: "OR"}
      message: "Penalised logistic regression is only available for odds ratio"

    - id: ssw_forces_or
      source: formals_default
      type: forces
      condition: "method == 'SSW'"
      forces: {sm: "OR"}
      message: "Sample size method is only available for odds ratio"

    - id: tau_preset_enables_random
      source: formals_default
      type: forces
      condition: "!is.null(tau.preset)"
      forces: {random: "TRUE"}
      message: "specifying tau.preset automatically enables random-effects model"

    # --- extracted from Rd description ---

    - id: valid_sm
      source: rd_description
      type: valid_values
      param: sm
      values: ["RR", "OR", "RD", "ASD", "DOR", "VE"]

    - id: valid_method
      source: rd_description
      type: valid_values
      param: method
      values: ["Inverse", "MH", "Peto", "GLMM", "LRP", "SSW"]

    - id: valid_method_incr
      source: rd_description
      type: valid_values
      param: method.incr
      values: ["only0", "if0all", "all", "user"]

    - id: valid_model_glmm
      source: rd_description
      type: valid_values
      param: model.glmm
      values: ["UM.FS", "UM.RS", "CM.EL", "CM.AL"]

    - id: model_glmm_conditional
      source: rd_description
      type: conditional
      param: model.glmm
      enabled_when: "method == 'GLMM'"
      message: "model.glmm is only effective when method = 'GLMM'"

    # --- extracted from source code ---

    - id: allstudies_only_for_ratio
      source: source_code
      type: conditional
      param: allstudies
      enabled_when: "sm %in% c('RR', 'OR', 'DOR')"
      message: "allstudies applies only when sm is RR, OR, or DOR"

    # --- added by expert ---

    - id: peto_not_for_imbalanced
      source: expert
      type: incompatible
      incompatible: {method: "Peto"}
      condition: "group sample sizes are highly imbalanced"
      message: >
        Peto method is biased when group sample sizes differ substantially.
        See Bradburn et al. (2007) Stat Med.
