# PR policy gate: verifies Issue linkage, required sections, and traceability.
# Runs on every PR to main/master regardless of file changes.
on:
  pull_request:
    branches: [main, master]
    types: [opened, edited, synchronize, labeled, unlabeled]

name: PR Policy

permissions:
  contents: read
  pull-requests: read

jobs:
  check-policy:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check PR policy compliance
        uses: actions/github-script@v8
        with:
          script: |
            const pr = context.payload.pull_request;
            const body = pr.body || '';
            const labels = pr.labels.map(l => l.name);
            const errors = [];
            const warnings = [];

            // --- Exception handling ---
            const isException = labels.includes('no-issue') ||
                                labels.includes('hotfix') ||
                                labels.includes('docs-only');

            // --- 1. Issue linkage ---
            const issuePattern = /(?:closes|fixes|resolves)\s+#\d+/gi;
            const hasIssueLink = issuePattern.test(body);

            if (!hasIssueLink) {
              if (isException) {
                // Exception: check for justification (flexible: "exception justification" or "**Exception**:" or "Exception:")
                const exceptionSection = body.match(/(?:exception justification|(?:\*\*)?exception\s*:)[^]*?(?=\n##|\n$|$)/i);
                const justification = exceptionSection ? exceptionSection[0].replace(/^(?:\*\*)?exception\s*:\s*/i, '').replace(/^exception justification\s*:\s*/i, '').trim() : '';
                if (justification.length < 20) {
                  errors.push(
                    '**Issue linkage**: No `Closes #N` found and exception label is set, ' +
                    'but no sufficient justification provided. ' +
                    'Add an explanation in the "Exception justification" section.'
                  );
                } else {
                  warnings.push(
                    '**Issue linkage**: Exception — no Issue linked but justification provided.'
                  );
                }
              } else {
                errors.push(
                  '**Issue linkage**: PR body must contain `Closes #<issue-number>` ' +
                  '(or `Fixes #N` / `Resolves #N`). ' +
                  'If this is a hotfix or docs-only change, add the `no-issue`, `hotfix`, ' +
                  'or `docs-only` label and provide a justification.'
                );
              }
            }

            // --- 2. Risk / Impact section ---
            const hasRisk = /## Risk \/ Impact/i.test(body);
            const riskSection = body.match(/## Risk \/ Impact[^]*?(?=\n## |$)/i);
            const riskContent = riskSection
              ? riskSection[0].replace(/## Risk \/ Impact/i, '').replace(/<!--[^]*?-->/g, '').trim()
              : '';

            if (!hasRisk) {
              errors.push('**Risk / Impact**: Section is missing from the PR body.');
            } else if (riskContent.length < 5) {
              errors.push(
                '**Risk / Impact**: Section exists but appears empty. ' +
                'Describe what could go wrong and who/what is affected.'
              );
            }

            // --- 3. Rollback Plan section ---
            const changeType = body.match(/- \[x\] (feat|fix|refactor|ci|chore)/i);
            const isDocsOrTestOnly = /- \[x\] (docs|test):/i.test(body) && !changeType;

            const hasRollback = /## Rollback Plan/i.test(body);
            const rollbackSection = body.match(/## Rollback Plan[^]*?(?=\n## |$)/i);
            const rollbackContent = rollbackSection
              ? rollbackSection[0].replace(/## Rollback Plan/i, '').replace(/<!--[^]*?-->/g, '').trim()
              : '';

            if (!isDocsOrTestOnly) {
              if (!hasRollback) {
                errors.push('**Rollback Plan**: Section is missing from the PR body.');
              } else if (rollbackContent.length < 3 || rollbackContent === '-') {
                errors.push(
                  '**Rollback Plan**: Section exists but appears empty. ' +
                  'Describe how to revert if something goes wrong.'
                );
              }
            }

            // --- 4. Traceability section ---
            const hasTraceability = /## Traceability/i.test(body);
            if (!hasTraceability) {
              errors.push('**Traceability**: Section is missing from the PR body.');
            }

            // --- Report ---
            if (errors.length > 0) {
              const report = [
                '## PR Policy Check Failed',
                '',
                '### Errors (must fix)',
                ...errors.map(e => `- ${e}`),
              ];
              if (warnings.length > 0) {
                report.push('', '### Warnings', ...warnings.map(w => `- ${w}`));
              }
              report.push(
                '',
                'See [PR template](/.github/PULL_REQUEST_TEMPLATE.md) for required sections.',
              );
              core.setFailed(report.join('\n'));
            } else if (warnings.length > 0) {
              core.warning(warnings.join('\n'));
            }
