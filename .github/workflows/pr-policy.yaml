# PR policy gate: verifies Issue linkage, required sections, and traceability.
# Runs on every PR to main/master regardless of file changes.
#
# Exception contract:
#   When a PR has no Issue link (Closes #N), it must:
#   1. Have one of the exception labels: no-issue, hotfix
#   2. Have a "## Exception" section with:
#      - Type: <no-issue / hotfix>
#      - Justification: <reason, min 20 chars>
#   The canonical format is defined in workflow-policy.mdc and PULL_REQUEST_TEMPLATE.md.
on:
  pull_request:
    branches: [main, master]
    types: [opened, edited, synchronize, labeled, unlabeled]

name: PR Policy

permissions:
  contents: read
  pull-requests: read

jobs:
  check-policy:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check PR policy compliance
        uses: actions/github-script@v8
        with:
          script: |
            const pr = context.payload.pull_request;
            const body = pr.body || '';
            const labels = pr.labels.map(l => l.name);
            const errors = [];
            const warnings = [];

            const EXCEPTION_LABELS = ['no-issue', 'hotfix'];
            const isException = EXCEPTION_LABELS.some(l => labels.includes(l));

            // --- 1. Issue linkage ---
            const hasIssueLink = /(?:closes|fixes|resolves)\s+#\d+/gi.test(body);

            if (!hasIssueLink) {
              if (isException) {
                const exceptionMatch = body.match(/## Exception[^]*?(?=\n## |$)/i);
                const exceptionBlock = exceptionMatch ? exceptionMatch[0] : '';

                const justMatch = exceptionBlock.match(/Justification:\s*(.+)/i);
                const justification = justMatch ? justMatch[1].replace(/<!--[^]*?-->/g, '').trim() : '';

                if (justification.length < 20) {
                  errors.push(
                    '**Issue linkage**: Exception label is set but justification is missing or too short. ' +
                    'Fill in the `## Exception` section with `- Justification: <reason>` (min 20 chars).'
                  );
                } else {
                  warnings.push(
                    '**Issue linkage**: Exception — no Issue linked. Justification accepted.'
                  );
                }
              } else {
                errors.push(
                  '**Issue linkage**: PR body must contain `Closes #<number>` ' +
                  '(or `Fixes #N` / `Resolves #N`). ' +
                  'If this is an exception, add a label (`no-issue` / `hotfix`) ' +
                  'and fill in the `## Exception` section.'
                );
              }
            }

            // --- 2. Risk / Impact section ---
            const riskMatch = body.match(/## Risk \/ Impact[^]*?(?=\n## |$)/i);
            const riskContent = riskMatch
              ? riskMatch[0].replace(/## Risk \/ Impact/i, '').replace(/<!--[^]*?-->/g, '').trim()
              : '';

            if (!riskMatch) {
              errors.push('**Risk / Impact**: Section is missing from the PR body.');
            } else if (riskContent.length < 5) {
              errors.push(
                '**Risk / Impact**: Section exists but appears empty. ' +
                'Describe what could go wrong and who/what is affected.'
              );
            }

            // --- 3. Rollback Plan section ---
            const changeType = body.match(/- \[x\] (feat|fix|refactor|ci|chore)/i);
            const isDocsOrTestOnly = /- \[x\] (docs|test):/i.test(body) && !changeType;

            const rollbackMatch = body.match(/## Rollback Plan[^]*?(?=\n## |$)/i);
            const rollbackContent = rollbackMatch
              ? rollbackMatch[0].replace(/## Rollback Plan/i, '').replace(/<!--[^]*?-->/g, '').trim()
              : '';

            if (!isDocsOrTestOnly) {
              if (!rollbackMatch) {
                errors.push('**Rollback Plan**: Section is missing from the PR body.');
              } else if (rollbackContent.length < 3 || rollbackContent === '-') {
                errors.push(
                  '**Rollback Plan**: Section exists but appears empty. ' +
                  'Describe how to revert if something goes wrong.'
                );
              }
            }

            // --- 4. Traceability section ---
            if (!/## Traceability/i.test(body)) {
              errors.push('**Traceability**: Section is missing from the PR body.');
            }

            // --- 5. PR title format (Conventional Commits) ---
            const titleRegex = /^(feat|fix|refactor|perf|test|docs|build|ci|chore|style|revert)(\(.+\))?!?:\s.+$/;
            if (!titleRegex.test(pr.title)) {
              errors.push(
                '**PR title**: Must follow Conventional Commits format: ' +
                '`<type>(<scope>): <summary>`. ' +
                'Valid types: feat, fix, refactor, perf, test, docs, build, ci, chore, style, revert'
              );
            }

            // --- 6. Base branch check (HS#9) ---
            if (pr.base.ref !== 'main' && pr.base.ref !== 'master') {
              errors.push(
                '**Base branch**: PR must target `main`. ' +
                'Using `--base feat/<branch>` causes the PR to auto-close when the base branch is deleted on merge. ' +
                'Document dependencies in the PR body instead.'
              );
            }

            // --- 7. Type label (workflow-policy § Label Taxonomy) ---
            const TYPE_LABELS = ['feat', 'fix', 'refactor', 'docs', 'test', 'ci', 'build', 'chore'];
            const hasTypeLabel = TYPE_LABELS.some(t => labels.includes(t));
            if (!hasTypeLabel) {
              errors.push(
                '**Type label**: PR must have exactly one type label ' +
                '(`feat`, `fix`, `refactor`, `docs`, `test`, `ci`, `build`, `chore`). ' +
                'Add a label via `--label "<type>"` in `gh pr create`.'
              );
            }

            // --- 8. Summary section ---
            if (!/## Summary/i.test(body)) {
              errors.push('**Summary**: Section is missing from the PR body.');
            }

            // --- 9. Review Checklist section ---
            if (!/## Review Checklist/i.test(body)) {
              errors.push('**Review Checklist**: Section is missing from the PR body.');
            }

            // --- Report ---
            if (errors.length > 0) {
              const report = [
                '## PR Policy Check Failed',
                '',
                '### Errors (must fix)',
                ...errors.map(e => `- ${e}`),
              ];
              if (warnings.length > 0) {
                report.push('', '### Warnings', ...warnings.map(w => `- ${w}`));
              }
              report.push(
                '',
                'See [PR template](/.github/PULL_REQUEST_TEMPLATE.md) for required sections.',
              );
              core.setFailed(report.join('\n'));
            } else if (warnings.length > 0) {
              core.warning(warnings.join('\n'));
            }
