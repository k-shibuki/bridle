# CI gate for pull requests.
# Runs schema validation, linting, tests, R CMD check, and coverage as separate jobs.
# Full OS matrix is handled by R-CMD-check.yaml on push to main.
on:
  pull_request:
    branches: [main, master]

name: CI

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
  BRIDLE_IN_CONTAINER: 1
  RENV_CONFIG_AUTOLOADER_ENABLED: "FALSE"

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      r_source: ${{ steps.filter.outputs.r_source }}
      r_deps: ${{ steps.filter.outputs.r_deps }}
      renv_deps: ${{ steps.filter.outputs.renv_deps }}
      schemas: ${{ steps.filter.outputs.schemas }}
      ci_config: ${{ steps.filter.outputs.ci_config }}
    steps:
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            r_source:
              - 'R/**'
              - 'tests/**'
              - 'DESCRIPTION'
              - 'NAMESPACE'
            r_deps:
              - 'renv.lock'
              - '.Rbuildignore'
            renv_deps:
              - 'DESCRIPTION'
              - 'renv.lock'
              - 'renv/settings.json'
            schemas:
              - 'docs/schemas/**'
              - 'tools/validate-schemas.R'
            ci_config:
              - 'Makefile'
              - 'tools/**'
              - '.github/workflows/**'
              - 'containers/**'
              - '.pre-commit-config.yaml'
              - '.lintr'

  ci-config:
    needs: changes
    if: needs.changes.outputs.ci_config == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: Validate workflow YAML syntax
        run: |
          for f in .github/workflows/*.yaml .github/workflows/*.yml; do
            [ -f "$f" ] || continue
            echo "Checking $f..."
            python3 -c "import yaml, sys; yaml.safe_load(open(sys.argv[1]))" "$f"
          done

      - name: Check Makefile syntax
        run: make -n help >/dev/null 2>&1

      - name: Shellcheck tools scripts
        run: |
          if command -v shellcheck >/dev/null 2>&1; then
            for f in tools/*.sh; do
              [ -f "$f" ] || continue
              echo "Checking $f..."
              shellcheck "$f" || true
            done
          else
            echo "shellcheck not available, skipping"
          fi

  renv-check:
    needs: changes
    if: needs.changes.outputs.renv_deps == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install renv
        run: install.packages("renv", repos = "https://cloud.r-project.org")
        shell: Rscript {0}

      - name: Check renv.lock vs DESCRIPTION
        run: |
          desc <- read.dcf("DESCRIPTION")
          get_deps <- function(field) {
            val <- desc[1, field]
            if (is.na(val)) return(character(0))
            deps <- trimws(unlist(strsplit(val, ",\\s*")))
            deps <- trimws(gsub("\\(.*\\)", "", deps))
            deps[nzchar(deps)]
          }
          all_deps <- c(get_deps("Imports"), get_deps("Depends"), get_deps("Suggests"))
          all_deps <- all_deps[all_deps != "R"]

          lock <- renv::lockfile_read("renv.lock")
          locked_pkgs <- names(lock$Packages)

          missing <- setdiff(all_deps, locked_pkgs)
          if (length(missing) > 0L) {
            cat("Packages in DESCRIPTION but not in renv.lock:\n")
            cat(paste(" -", missing), sep = "\n")
            cat("\n")
            stop("renv.lock is out of sync with DESCRIPTION. Run 'make renv-snapshot' and commit renv.lock.")
          }
          cat("All", length(all_deps), "DESCRIPTION dependencies are tracked in renv.lock.\n")
        shell: Rscript {0}

  validate-schemas:
    needs: changes
    if: needs.changes.outputs.schemas == 'true' || needs.changes.outputs.r_source == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install schema validation deps
        run: |
          install.packages(c("yaml", "cli", "jsonlite"), repos = "https://cloud.r-project.org")
        shell: Rscript {0}

      - name: Validate schemas
        run: Rscript tools/validate-schemas.R

  format-check:
    needs: changes
    if: needs.changes.outputs.r_source == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::styler

      - name: Check formatting
        run: |
          out <- styler::style_pkg(dry = "on")
          if (any(out[["changed"]])) {
            cat("Files with formatting issues:\n")
            print(out[out[["changed"]], "file"])
            stop("Run 'make format' to fix formatting issues.")
          }
        shell: Rscript {0}

  lint:
    needs: changes
    if: needs.changes.outputs.r_source == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::lintr

      - name: Lint package
        run: |
          lints <- lintr::lint_package()
          print(lints)
          if (length(lints) > 0L) {
            stop("Lint errors found: ", length(lints), " lint(s)")
          }
        shell: Rscript {0}

      - name: Save lint results
        if: always()
        run: |
          lints <- lintr::lint_package()
          df <- if (length(lints) > 0L) as.data.frame(lints) else data.frame()
          writeLines(jsonlite::toJSON(df, auto_unbox = TRUE), "lint-results.json")
        shell: Rscript {0}

      - name: Upload lint results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lint-results
          path: lint-results.json
          retention-days: 7

  test:
    needs: [changes, lint]
    if: needs.changes.outputs.r_source == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::testthat, any::rcmdcheck

      - name: Run tests
        run: |
          results <- devtools::test()
          df <- as.data.frame(results)
          if (any(df$failed > 0)) {
            stop("Tests had ", sum(df$failed), " failure(s)")
          }
          if (any(df$error > 0)) {
            stop("Tests had ", sum(df$error), " error(s)")
          }
          if (any(df$warning > 0)) {
            stop("Tests produced ", sum(df$warning), " warning(s)")
          }
        shell: Rscript {0}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: |
            tests/testthat/_snaps/
          retention-days: 7

  check:
    needs: [changes, test]
    if: |
      always() &&
      !cancelled() &&
      (needs.test.result == 'success' || needs.test.result == 'skipped') &&
      (needs.changes.outputs.r_source == 'true' || needs.changes.outputs.r_deps == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck

      - uses: r-lib/actions/check-r-package@v2
        with:
          args: 'c("--no-manual", "--as-cran")'
          error-on: '"note"'

      - name: Upload check results
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: check-results
          path: check
          retention-days: 7

  coverage:
    needs: [changes, check]
    if: needs.changes.outputs.r_source == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::covr

      - name: Test coverage
        run: |
          cov <- covr::package_coverage()
          pct <- covr::percent_coverage(cov)
          cat(sprintf("Line coverage: %.1f%%\n", pct))
          covr::codecov(coverage = cov, quiet = FALSE)
          # Coverage threshold SSOT: test-strategy.mdc § Coverage Threshold Policy
          if (pct < 80) {
            stop(sprintf("Coverage %.1f%% is below the 80%% threshold", pct))
          }
        shell: Rscript {0}

  # Required status check that always runs.
  # Use this as the single required check in branch protection settings.
  # It passes when all relevant jobs pass or are correctly skipped.
  ci-pass:
    if: always()
    needs: [ci-config, renv-check, validate-schemas, format-check, lint, test, check, coverage]
    runs-on: ubuntu-latest
    steps:
      - name: Verify all jobs passed or were skipped
        run: |
          results=("${{ needs.ci-config.result }}" \
                   "${{ needs.renv-check.result }}" \
                   "${{ needs.validate-schemas.result }}" \
                   "${{ needs.format-check.result }}" \
                   "${{ needs.lint.result }}" \
                   "${{ needs.test.result }}" \
                   "${{ needs.check.result }}" \
                   "${{ needs.coverage.result }}")
          for r in "${results[@]}"; do
            if [ "$r" = "failure" ] || [ "$r" = "cancelled" ]; then
              echo "Job failed or was cancelled: $r"
              exit 1
            fi
          done
          echo "All jobs passed or were correctly skipped."

  ci-summary:
    if: always()
    needs: [ci-config, renv-check, validate-schemas, format-check, lint, test, check, coverage]
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Post failure summary
        if: contains(needs.*.result, 'failure')
        uses: actions/github-script@v8
        with:
          script: |
            const jobs = {
              'ci-config': '${{ needs.ci-config.result }}',
              'renv-check': '${{ needs.renv-check.result }}',
              'validate-schemas': '${{ needs.validate-schemas.result }}',
              'format-check': '${{ needs.format-check.result }}',
              'lint': '${{ needs.lint.result }}',
              'test': '${{ needs.test.result }}',
              'check': '${{ needs.check.result }}',
              'coverage': '${{ needs.coverage.result }}'
            };
            const rows = Object.entries(jobs).map(([name, result]) => {
              const icon = result === 'success' ? '✅' :
                           result === 'failure' ? '❌' :
                           result === 'skipped' ? '⏭️' : '⚠️';
              return `| ${name} | ${icon} ${result} |`;
            }).join('\n');
            const body = `## CI Summary\n\n| Job | Result |\n|---|---|\n${rows}\n\n` +
              `See [workflow run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) for details.`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });
