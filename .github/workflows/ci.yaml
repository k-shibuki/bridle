# CI gate for pull requests.
# Runs schema validation, linting, tests, R CMD check, and coverage as separate jobs.
# Full OS matrix is handled by R-CMD-check.yaml on push to main.
#
# Test skipping: when the PR still touches R paths (cumulative diff) but the current
# push does not, test-unit and test-e2e are skipped only if the parent commit already
# has successful paired runs from this workflow (test-unit + test-e2e), or a legacy
# successful "test" check before the job split. Otherwise tests run (closes the
# loophole where a docs-only push could hide a prior failing test via skip).
#
# Manual PR checks: R-only change runs test-unit and test-e2e; doc-only follow-up
# skips both after green parent test pair (or legacy test); failing test then doc-only
# push re-runs tests; fork PRs always run tests when r_source is true (no parent
# check lookup on the fork repo).
on:
  pull_request:
    branches: [main, master]

name: CI

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
  BRIDLE_IN_CONTAINER: 1
  RENV_CONFIG_AUTOLOADER_ENABLED: "FALSE"

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      r_source: ${{ steps.filter.outputs.r_source }}
      r_source_push: ${{ steps.filter_push.outputs.r_source }}
      r_deps: ${{ steps.filter.outputs.r_deps }}
      renv_deps: ${{ steps.filter.outputs.renv_deps }}
      schemas: ${{ steps.filter.outputs.schemas }}
      ci_config: ${{ steps.filter.outputs.ci_config }}
      kb_files: ${{ steps.filter.outputs.kb_files }}
      markdown: ${{ steps.filter.outputs.markdown }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            r_source:
              - 'R/**'
              - 'tests/**'
              - 'DESCRIPTION'
              - 'NAMESPACE'
            r_deps:
              - 'renv.lock'
              - '.Rbuildignore'
            renv_deps:
              - 'DESCRIPTION'
              - 'renv.lock'
              - 'renv/settings.json'
            schemas:
              - 'docs/schemas/**'
              - 'tools/validate-schemas.R'
            ci_config:
              - 'Makefile'
              - 'tools/**'
              - 'docs/agent-control/fsm/**'
              - 'tests/evidence/golden/fsm/**'
              - '.github/workflows/**'
              - 'containers/**'
              - '.pre-commit-config.yaml'
              - '.lintr'
            kb_files:
              - '.cursor/knowledge/**'
              - '.cursor/rules/knowledge-index.mdc'
              - 'AGENTS.md'
              - '.cursor/commands/pr-review.md'
            markdown:
              - '**/*.md'
              - '.markdownlint-cli2.jsonc'

      # Incremental R-related paths for this push only (parent..HEAD). Used to avoid
      # skipping tests after a failing run when a later push only touches docs.
      - uses: dorny/paths-filter@v4
        id: filter_push
        with:
          base: ${{ github.event.before != '0000000000000000000000000000000000000000' && github.event.before || github.event.pull_request.base.sha }}
          ref: ${{ github.sha }}
          filters: |
            r_source:
              - 'R/**'
              - 'tests/**'
              - 'DESCRIPTION'
              - 'NAMESPACE'

  test-skip-guard:
    needs: changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      checks: read
      pull-requests: read
    outputs:
      run_test: ${{ steps.decide.outputs.run_test }}
    steps:
      - name: Decide whether test job must run
        id: decide
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -uo pipefail
          r_source='${{ needs.changes.outputs.r_source }}'
          r_push='${{ needs.changes.outputs.r_source_push }}'
          before='${{ github.event.before }}'
          head_repo='${{ github.event.pull_request.head.repo.full_name }}'

          if [ "$r_source" != "true" ]; then
            echo "run_test=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "$r_push" = "true" ]; then
            echo "run_test=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ -z "$before" ] || [ "$before" = "0000000000000000000000000000000000000000" ]; then
            echo "run_test=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Fork PR: token may not list check runs on the head repo; run tests conservatively.
          if [ "$head_repo" != "${{ github.repository }}" ]; then
            echo "run_test=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          api_ok=0
          resp="$(gh api "repos/${head_repo}/commits/${before}/check-runs?per_page=100" 2>/dev/null)" || api_ok=$?

          if [ "$api_ok" -ne 0 ] || [ -z "$resp" ]; then
            echo "run_test=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          can_skip="$(printf '%s' "$resp" | jq -r --arg b "$before" '
            def last_conclusion($name; $sha):
              [ .check_runs[]?
                | select(.name == $name
                    and .head_sha == $sha
                    and .app.slug == "github-actions"
                    and .status == "completed")
              ]
              | sort_by(.completed_at)
              | last
              | .conclusion // "missing";
            (last_conclusion("test-unit"; $b) == "success"
              and last_conclusion("test-e2e"; $b) == "success")
            or
            (last_conclusion("test"; $b) == "success"
              and last_conclusion("test-unit"; $b) == "missing"
              and last_conclusion("test-e2e"; $b) == "missing")
          ' 2>/dev/null)" || can_skip="false"
          if [ -z "$can_skip" ]; then
            can_skip="false"
          fi

          if [ "$can_skip" = "true" ]; then
            echo "run_test=false" >> "$GITHUB_OUTPUT"
          else
            echo "run_test=true" >> "$GITHUB_OUTPUT"
          fi

  ci-config:
    needs: changes
    if: needs.changes.outputs.ci_config == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: Validate workflow YAML syntax
        run: |
          for f in .github/workflows/*.yaml .github/workflows/*.yml; do
            [ -f "$f" ] || continue
            echo "Checking $f..."
            python3 -c "import yaml, sys; yaml.safe_load(open(sys.argv[1]))" "$f"
          done

      - name: Check Makefile syntax
        run: make -n help >/dev/null 2>&1

      - name: Shellcheck tools scripts
        run: |
          if command -v shellcheck >/dev/null 2>&1; then
            for f in tools/*.sh; do
              [ -f "$f" ] || continue
              echo "Checking $f..."
              shellcheck "$f"
            done
          else
            echo "shellcheck not available, skipping"
          fi

      - name: FSM jq offline fixtures
        run: bash tools/test-fsm-fixtures.sh

  package-sync-verify:
    needs: changes
    if: needs.changes.outputs.renv_deps == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install renv
        run: install.packages("renv", repos = "https://cloud.r-project.org")
        shell: Rscript {0}

      - name: Check renv.lock vs DESCRIPTION
        run: |
          desc <- read.dcf("DESCRIPTION")
          get_deps <- function(field) {
            val <- desc[1, field]
            if (is.na(val)) return(character(0))
            deps <- trimws(unlist(strsplit(val, ",\\s*")))
            deps <- trimws(gsub("\\(.*\\)", "", deps))
            deps[nzchar(deps)]
          }
          all_deps <- c(get_deps("Imports"), get_deps("Depends"), get_deps("Suggests"))
          all_deps <- all_deps[all_deps != "R"]

          lock <- renv::lockfile_read("renv.lock")
          locked_pkgs <- names(lock$Packages)

          missing <- setdiff(all_deps, locked_pkgs)
          if (length(missing) > 0L) {
            cat("Packages in DESCRIPTION but not in renv.lock:\n")
            cat(paste(" -", missing), sep = "\n")
            cat("\n")
            stop("renv.lock is out of sync with DESCRIPTION. Run 'make package-snapshot' and commit renv.lock.")
          }
          cat("All", length(all_deps), "DESCRIPTION dependencies are tracked in renv.lock.\n")
        shell: Rscript {0}

  schema-validate:
    needs: changes
    if: needs.changes.outputs.schemas == 'true' || needs.changes.outputs.r_source == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install schema validation deps
        run: |
          install.packages(c("yaml", "cli", "jsonlite"), repos = "https://cloud.r-project.org")
        shell: Rscript {0}

      - name: Validate schemas
        run: Rscript tools/validate-schemas.R

  format-verify:
    needs: changes
    if: needs.changes.outputs.r_source == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::styler

      - name: Check formatting
        run: |
          out <- styler::style_pkg(dry = "on")
          if (any(out[["changed"]])) {
            cat("Files with formatting issues:\n")
            print(out[out[["changed"]], "file"])
            stop("Run 'make format' to fix formatting issues.")
          }
        shell: Rscript {0}

  lint:
    needs: changes
    if: needs.changes.outputs.r_source == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::lintr, any::pkgload, any::jsonlite

      - name: Lint package
        run: |
          pkgload::load_all()
          lints <- lintr::lint_package()
          print(lints)
          if (length(lints) > 0L) {
            stop("Lint errors found: ", length(lints), " lint(s)")
          }
        shell: Rscript {0}

      - name: Save lint results
        if: always()
        run: |
          pkgload::load_all()
          lints <- lintr::lint_package()
          df <- if (length(lints) > 0L) as.data.frame(lints) else data.frame()
          writeLines(jsonlite::toJSON(df, auto_unbox = TRUE), "lint-results.json")
        shell: Rscript {0}

      - name: Upload lint results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lint-results
          path: lint-results.json
          retention-days: 7

  test-unit:
    needs: [changes, test-skip-guard]
    if: |
      needs.changes.outputs.r_source == 'true' &&
      needs.test-skip-guard.outputs.run_test == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      BRIDLE_TEST_TIER: unit
    steps:
      - uses: actions/checkout@v6

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::testthat, any::rcmdcheck

      - name: Run unit-tier tests
        run: |
          results <- devtools::test()
          df <- as.data.frame(results)
          if (any(df$failed > 0)) {
            stop("Tests had ", sum(df$failed), " failure(s)")
          }
          if (any(df$error > 0)) {
            stop("Tests had ", sum(df$error), " error(s)")
          }
          if (any(df$warning > 0)) {
            stop("Tests produced ", sum(df$warning), " warning(s)")
          }
        shell: Rscript {0}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-unit
          path: |
            tests/testthat/_snaps/
          retention-days: 7

  test-e2e:
    needs: [changes, test-skip-guard]
    if: |
      needs.changes.outputs.r_source == 'true' &&
      needs.test-skip-guard.outputs.run_test == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::testthat, any::rcmdcheck

      - name: Run e2e and integration tests
        run: |
          results <- devtools::test(filter = "e2e-|integration-|pipeline-")
          df <- as.data.frame(results)
          if (any(df$failed > 0)) {
            stop("Tests had ", sum(df$failed), " failure(s)")
          }
          if (any(df$error > 0)) {
            stop("Tests had ", sum(df$error), " error(s)")
          }
          if (any(df$warning > 0)) {
            stop("Tests produced ", sum(df$warning), " warning(s)")
          }
        shell: Rscript {0}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-e2e
          path: |
            tests/testthat/_snaps/
          retention-days: 7

  check:
    needs: [changes]
    if: |
      needs.changes.outputs.r_source == 'true' || needs.changes.outputs.r_deps == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck

      - uses: r-lib/actions/check-r-package@v2
        with:
          args: 'c("--no-manual", "--as-cran", "--no-tests")'
          error-on: '"note"'

      - name: Upload check results
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: check-results
          path: check
          retention-days: 7

  knowledge-validate:
    needs: changes
    if: needs.changes.outputs.kb_files == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: Validate knowledge base consistency
        run: make knowledge-validate

      - name: Check review category sync (AGENTS.md vs pr-review.md)
        run: make review-sync-verify

  markdown-lint:
    needs: changes
    if: needs.changes.outputs.markdown == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: DavidAnson/markdownlint-cli2-action@v23

  # Required status check that always runs.
  # Use this as the single required check in branch protection settings.
  # It passes when all relevant jobs pass or are correctly skipped.
  ci-pass:
    if: always()
    needs: [changes, test-skip-guard, ci-config, package-sync-verify, schema-validate, format-verify, lint, test-unit, test-e2e, check, knowledge-validate, markdown-lint]
    runs-on: ubuntu-latest
    steps:
      - name: Verify all jobs passed or were skipped
        run: |
          results=("${{ needs.changes.result }}" \
                   "${{ needs.test-skip-guard.result }}" \
                   "${{ needs.ci-config.result }}" \
                   "${{ needs.package-sync-verify.result }}" \
                   "${{ needs.schema-validate.result }}" \
                   "${{ needs.format-verify.result }}" \
                   "${{ needs.lint.result }}" \
                   "${{ needs.test-unit.result }}" \
                   "${{ needs.test-e2e.result }}" \
                   "${{ needs.check.result }}" \
                   "${{ needs.knowledge-validate.result }}" \
                   "${{ needs.markdown-lint.result }}")
          for r in "${results[@]}"; do
            if [ "$r" = "failure" ] || [ "$r" = "cancelled" ]; then
              echo "Job failed or was cancelled: $r"
              exit 1
            fi
          done
          echo "All jobs passed or were correctly skipped."

  ci-summary:
    if: always()
    needs: [changes, test-skip-guard, ci-config, package-sync-verify, schema-validate, format-verify, lint, test-unit, test-e2e, check, knowledge-validate, markdown-lint]
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Post failure summary
        if: contains(needs.*.result, 'failure')
        uses: actions/github-script@v9
        with:
          script: |
            const jobs = {
              'changes': '${{ needs.changes.result }}',
              'test-skip-guard': '${{ needs.test-skip-guard.result }}',
              'ci-config': '${{ needs.ci-config.result }}',
              'package-sync-verify': '${{ needs.package-sync-verify.result }}',
              'schema-validate': '${{ needs.schema-validate.result }}',
              'format-verify': '${{ needs.format-verify.result }}',
              'lint': '${{ needs.lint.result }}',
              'test-unit': '${{ needs.test-unit.result }}',
              'test-e2e': '${{ needs.test-e2e.result }}',
              'check': '${{ needs.check.result }}',
              'knowledge-validate': '${{ needs.knowledge-validate.result }}',
              'markdown-lint': '${{ needs.markdown-lint.result }}'
            };
            const rows = Object.entries(jobs).map(([name, result]) => {
              const icon = result === 'success' ? '✅' :
                           result === 'failure' ? '❌' :
                           result === 'skipped' ? '⏭️' : '⚠️';
              return `| ${name} | ${icon} ${result} |`;
            }).join('\n');
            const body = `## CI Summary\n\n| Job | Result |\n|---|---|\n${rows}\n\n` +
              `See [workflow run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) for details.`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });
